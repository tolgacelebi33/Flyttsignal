name: FlyttSignal — Scrape och publicera

on:
  schedule:
    # Varje måndag 06:00 UTC (08:00 svensk tid)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Kör manuellt: Actions → FlyttSignal → Run workflow

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Hämta repot
        uses: actions/checkout@v4

      - name: Installera Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installera beroenden
        run: pip install requests beautifulsoup4

      - name: Kör scraper och bygg index.html
        run: python build_final.py

      - name: Spara snapshot i repot
        run: |
          git config user.name "FlyttSignal Bot"
          git config user.email "bot@flyttsignal"
          git add index.html snapshot_prev.json press_signals.json || true
          git diff --staged --quiet || git commit -m "Auto: $(date +%Y-%m-%d)"
          git push || true

      - name: Publicera på GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          include_files: index.html
